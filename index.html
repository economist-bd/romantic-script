STILL_NOTE; // keep reference

function render(list){
  const container = document.getElementById('cardsContainer');
  container.innerHTML = '';
  document.getElementById('countLabel').textContent = list.length + 'টি স্ক্রিপ্ট';
  list.forEach((s, idx)=>{
    const card = document.createElement('div');
    card.className = 'card';

    const linesHtml = s.lines.map(l => `
      <div class="line-row">
        <div class="ts">${l.t}</div>
        <div>
          <div class="speaker">${l.spk}</div>
          <div class="bn">${l.bn}</div>
          <div class="translit">${l.tr}</div>
          <div class="en">${l.en}</div>
        </div>
      </div>`).join('');

    card.innerHTML = `
      <button class="copy-btn" data-idx="${idx}">Copy</button>
      <div class="num">SCRIPT ${String(idx+1).padStart(2,'0')} / 50</div>
      <h2>${s.title}</h2>

      <div class="section-label">Visual Description</div>
      <div class="visual-block">
        <div>স্থির ডিজিটাল ইলাস্ট্রেশন, ২ডি স্টাইল। সেটিং: ${s.setting}</div>
        <ul>
          <li><strong>ছেলে:</strong> কোঁকড়ানো কালো চুল, ছাঁটা দাড়ি। ${s.manOutfit}</li>
          <li><strong>মেয়ে:</strong> লম্বা ঢেউ খেলানো কালো চুল। ${s.womanOutfit}</li>
          <li><strong>ভঙ্গি:</strong> ${s.pose}</li>
        </ul>
      </div>

      <div class="section-label">Audio &amp; Text Script Breakdown</div>
      <div>${linesHtml}</div>

      <div class="song-block">
        <div class="speaker">SONG (background, original)</div>
        <div class="bn">${s.song.bn}</div>
        <div class="translit">${s.song.tr}</div>
        <div class="en">${s.song.en}</div>
      </div>

      <div class="note">${STILL_NOTE}</div>
    `;
    container.appendChild(card);
  });

  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const i = parseInt(btn.getAttribute('data-idx'));
      const s = list[i];
      let text = `SCRIPT ${i+1}: ${s.title}\n\n`;
      text += `Visual Description\n`;
      text += `Static 2D animated-style digital illustration. Setting: ${s.setting}\n`;
      text += `- Man: curly black hair, trimmed beard. ${s.manOutfit}\n`;
      text += `- Woman: long wavy black hair. ${s.womanOutfit}\n`;
      text += `- Pose: ${s.pose}\n\n`;
      text += `Audio & Text Script Breakdown\n`;
      s.lines.forEach(l=>{
        text += `${l.t}\n${l.spk}: "${l.bn}"\nOn-screen Text: ${l.bn} (${l.tr})\nEnglish Translation: ${l.en}\n\n`;
      });
      text += `Background Song (original):\n${s.song.bn}\n(${s.song.tr})\n"${s.song.en}"\n\n`;
      text += STILL_NOTE;

      navigator.clipboard.writeText(text).then(()=>{
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); }, 1500);
      }).catch(()=>{
        btn.textContent = 'Failed';
        setTimeout(()=>{ btn.textContent='Copy'; }, 1500);
      });
    });
  });
}

render(scripts);

document.getElementById('searchBox').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  if(!q){ render(scripts); return; }
  const filtered = scripts.filter(s => s.title.toLowerCase().includes(q) || s.theme.toLowerCase().includes(q));
  render(filtered);
});
</script>
